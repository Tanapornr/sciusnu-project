<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SCIUSNU SMART | Admin</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand-title">SCIUSNU SMART</div>
        <div id="userLine" class="userline"></div>
      </div>
      <div class="actions">
        <button id="reminderButton" class="btn-ghost" type="button">ส่งแจ้งเตือนงานค้าง</button>
        <button id="refreshButton" class="btn-ghost" type="button">รีเฟรช</button>
        <button type="button" onclick="logout()">ออกจากระบบ</button>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="toolbar">
      <h1>แผงควบคุมแอดมิน</h1>
      <label style="min-width:260px;">
        รหัสโครงงาน
        <select id="projectFilter"></select>
      </label>
    </section>

    <section id="stats" class="stats"></section>

    <section class="layout layout-main">
      <div id="projectPanel" class="list"></div>

      <div class="list">
        <section class="panel">
          <div class="panel-header">
            <div class="panel-title">คำร้องรอตรวจ</div>
            <div id="quotaText" class="item-meta"></div>
          </div>
          <div id="requestList" class="panel-body list"></div>
        </section>

        <section class="panel">
          <div class="panel-header">
            <div class="panel-title">รายการส่งงานทั้งหมด</div>
          </div>
          <div id="submissionList" class="panel-body list"></div>
        </section>
      </div>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="config.js"></script>
  <script src="shared.js"></script>
  <script>
    const auth = requireAuth(['admin']);
    let dashboard = null;

    if (auth) {
      setTopbarUser(auth.user);
      loadDashboard();
    }

    document.getElementById('refreshButton').addEventListener('click', loadDashboard);
    document.getElementById('projectFilter').addEventListener('change', renderAll);
    document.getElementById('reminderButton').addEventListener('click', sendReminders);
    document.getElementById('requestList').addEventListener('click', async event => {
      const button = event.target.closest('button[data-action]');
      if (!button) {
        return;
      }
      const note = document.querySelector('textarea[data-request-note="' + button.dataset.id + '"]').value;
      await reviewRequest(button.dataset.id, button.dataset.action, note, button);
    });
    document.getElementById('submissionList').addEventListener('click', async event => {
      const button = event.target.closest('button[data-action]');
      if (!button) {
        return;
      }
      const note = document.querySelector('textarea[data-submission-note="' + button.dataset.id + '"]').value;
      await reviewSubmission(button.dataset.id, button.dataset.action, note, button);
    });

    async function loadDashboard() {
      try {
        dashboard = await api('dashboard', { token: auth.token });
        setTopbarUser(dashboard.session);
        renderStats(document.getElementById('stats'), dashboard.stats);
        document.getElementById('quotaText').textContent = 'โควตาอีเมลวันนี้: ' + dashboard.emailQuota;
        renderProjectFilter();
        renderAll();
      } catch (error) {
        toast(error.message, true);
      }
    }

    function renderProjectFilter() {
      const filter = document.getElementById('projectFilter');
      const current = filter.value;
      filter.innerHTML = '<option value="">ทุกโครงงาน</option>' + dashboard.projects.map(project =>
        '<option value="' + escapeAttr(project.projectCode) + '">' + escapeHtml(project.projectCode) + '</option>'
      ).join('');
      if (dashboard.projects.some(project => project.projectCode === current)) {
        filter.value = current;
      }
    }

    function renderAll() {
      renderProjects();
      renderRequests();
      renderSubmissions();
    }

    function currentProjectCode() {
      return document.getElementById('projectFilter').value;
    }

    function renderProjects() {
      const code = currentProjectCode();
      const projects = code
        ? dashboard.projects.filter(project => project.projectCode === code)
        : dashboard.projects.slice(0, 12);

      document.getElementById('projectPanel').innerHTML = projects.length
        ? projects.map(renderProjectCard).join('')
        : '<div class="empty">ไม่พบโครงงาน</div>';
    }

    function renderRequests() {
      const code = currentProjectCode();
      const items = (code
        ? dashboard.requests.filter(item => item.projectCode === code)
        : dashboard.requests).slice(0, 80);

      const node = document.getElementById('requestList');
      if (!items.length) {
        node.innerHTML = '<div class="empty">ยังไม่มีคำร้อง</div>';
        return;
      }

      node.innerHTML = items.map(item => {
        const canReview = item.status === 'รอตรวจ';
        const reviewBox = canReview
          ? '<div class="form-grid">' +
            '<label>หมายเหตุแอดมิน<textarea data-request-note="' + escapeAttr(item.id) + '">' + escapeHtml(item.adminNote || '') + '</textarea></label>' +
            '<div class="actions">' +
            '<button class="btn-ok" type="button" data-action="approve" data-id="' + escapeAttr(item.id) + '">อนุมัติคำร้อง</button>' +
            '<button class="btn-danger" type="button" data-action="reject" data-id="' + escapeAttr(item.id) + '">ไม่อนุมัติ</button>' +
            '</div>' +
            '</div>'
          : '';

        return '<article class="item">' +
          '<div class="item-head"><div><div class="item-title">' + escapeHtml(item.requestType) + '</div>' +
          '<div class="item-meta"><span>' + escapeHtml(item.id) + '</span><span>' + escapeHtml(item.projectCode) + '</span></div></div>' +
          statusBadge(item.status) + '</div>' +
          '<dl class="detail-grid">' +
          '<dt>นักเรียน</dt><dd>' + escapeHtml(item.studentName) + '</dd>' +
          '<dt>ไฟล์คำร้อง</dt><dd>' + fileLink(item.fileUrl, 'เปิด PDF') + '</dd>' +
          '<dt>หมายเหตุ</dt><dd>' + escapeHtml(item.studentNote || '-') + '</dd>' +
          '<dt>หมายเหตุแอดมิน</dt><dd>' + escapeHtml(item.adminNote || '-') + '</dd>' +
          '</dl>' +
          reviewBox +
          '</article>';
      }).join('');
    }

    function renderSubmissions() {
      const code = currentProjectCode();
      const items = (code
        ? dashboard.submissions.filter(item => item.projectCode === code)
        : dashboard.submissions).slice(0, 120);

      const node = document.getElementById('submissionList');
      if (!items.length) {
        node.innerHTML = '<div class="empty">ยังไม่มีรายการส่งงาน</div>';
        return;
      }

      node.innerHTML = items.map(item => {
        const canReview = item.status === 'รอตรวจ' || item.status === 'รอการตรวจอนุมัติ';
        const reviewBox = canReview
          ? '<div class="form-grid">' +
            '<label>หมายเหตุ<textarea data-submission-note="' + escapeAttr(item.id) + '">' + escapeHtml(item.note || '') + '</textarea></label>' +
            '<div class="actions">' +
            '<button class="btn-ok" type="button" data-action="approve" data-id="' + escapeAttr(item.id) + '">อนุมัติ</button>' +
            '<button class="btn-danger" type="button" data-action="reject" data-id="' + escapeAttr(item.id) + '">ไม่อนุมัติ</button>' +
            '</div>' +
            '</div>'
          : '';

        return '<article class="item">' +
          '<div class="item-head"><div><div class="item-title">' + escapeHtml(item.workType) + '</div>' +
          '<div class="item-meta"><span>' + escapeHtml(item.id) + '</span><span>' + escapeHtml(item.projectCode) + '</span></div></div>' +
          statusBadge(item.status) + '</div>' +
          submissionDetails(item) +
          reviewBox +
          '</article>';
      }).join('');
    }

    async function reviewRequest(requestId, decision, note, button) {
      setButtonBusy(button, true, 'กำลังบันทึก...');
      try {
        dashboard = await api('reviewRequest', {
          token: auth.token,
          requestId,
          decision,
          note
        });
        renderAll();
        toast('บันทึกผลคำร้องแล้ว');
      } catch (error) {
        toast(error.message, true);
      } finally {
        setButtonBusy(button, false, decision === 'approve' ? 'อนุมัติคำร้อง' : 'ไม่อนุมัติ');
      }
    }

    async function reviewSubmission(submissionId, decision, note, button) {
      setButtonBusy(button, true, 'กำลังบันทึก...');
      try {
        dashboard = await api('reviewSubmission', {
          token: auth.token,
          submissionId,
          decision,
          note
        });
        renderStats(document.getElementById('stats'), dashboard.stats);
        renderSubmissions();
        toast('บันทึกผลการตรวจงานแล้ว');
      } catch (error) {
        toast(error.message, true);
      } finally {
        setButtonBusy(button, false, decision === 'approve' ? 'อนุมัติ' : 'ไม่อนุมัติ');
      }
    }

    async function sendReminders() {
      const button = document.getElementById('reminderButton');
      setButtonBusy(button, true, 'กำลังส่ง...');
      try {
        const result = await api('sendPendingReminder', { token: auth.token });
        toast('ส่งแจ้งเตือนแล้ว ' + result.count + ' รายการ');
      } catch (error) {
        toast(error.message, true);
      } finally {
        setButtonBusy(button, false, 'ส่งแจ้งเตือนงานค้าง');
      }
    }
  </script>
</body>
</html>
